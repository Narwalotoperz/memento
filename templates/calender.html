{% extends "base.html" %}

{% block content %}
<h2>Month View</h2>
<div class="row">

  <!-- Calendar -->
  <div class="col-md-8">
    <div id="calendar"></div>
  </div>

  <!-- Notes panel -->
  <div class="col-md-4">
    <div class="card">
      <div class="card-body">

        <h4 id="selectedDate">Select a day</h4>

        <textarea
          id="noteText"
          class="form-control"
          rows="10"
          placeholder="Write your notes for this day..."
        ></textarea>

        <button class="btn btn-primary mt-3 w-100" onclick="saveNote()">
          Save note
        </button>

      </div>
    </div>
  </div>

</div>

<section class="py-5">

  <div class="container">
    <div class="p-5 bg-primary rounded big-block">

      <div class="row align-items-center h-100">

        <div class="col-md-6">
          <h3 class="h4 fw-bold text-white">
            You probably have n years left to live
          </h3>
        </div>

      </div>

    </div>
  </div>

</section>

<script>

let selectedDate = null;

document.addEventListener('DOMContentLoaded', function () {

  var calendarEl = document.getElementById('calendar');

  var calendar = new FullCalendar.Calendar(calendarEl, {

    initialView: 'dayGridMonth',
    height: 650,

    headerToolbar: {
      left: 'prev,next today',
      center: 'title',
      right: ''
    },

    dateClick: function(info) {

      selectedDate = info.dateStr;

      document.getElementById("selectedDate").innerText =
        "Notes for " + selectedDate;

      loadNote(selectedDate);

    }

  });

  calendar.render();
});


function saveNote(){

  if(!selectedDate){
    alert("Select a date first");
    return;
  }

  let note = document.getElementById("noteText").value;

  fetch("/save_note", {
    method:"POST",
    headers: {
      "Content-Type":"application/json"
    },
    body: JSON.stringify({
      date: selectedDate,
      note: note
    })
  });

}


function loadNote(date){

  fetch("/get_note?date=" + date)
    .then(res => res.json())
    .then(data => {

      document.getElementById("noteText").value =
        data.note || "";

    });

}

</script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.10.0/js/bootstrap-datepicker.min.js"></script>
{% endblock %}
